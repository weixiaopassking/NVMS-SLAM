YAML: 1.0

common:
  # imu_topic: /robot/imu #/livox/imu #  #/imu_raw   /gps/gtimu
  # lid_topic: /velodyne_points #/livox/lidar #  #/points_raw  /rslidar_points
  imu_topic: /livox/imu #  #/imu_raw   /gps/gtimu
  lid_topic: /livox/lidar #  #/points_raw  /rslidar_points
  gravity: 9.805 # 归一化后，统一重力模长

preprocess:
  point_filter_num: 1
  lidar_type: 1 # 1-AVIA 2-velodyne 3-ouster  4-robosense 5-pandar
  blind: 0.1

mapping:
  extrinsic_T: [0, 0, 0]
  extrinsic_R: [1, 0, 0, 0, 1, 0, 0, 0, 1]
  # extrinsic_T:
  #   [-0.010514839241742317, -0.008989784841758377, 0.037356468638334630]
  # extrinsic_R:
  #   [
  #     0.99985813160508060000,
  #     -0.0002258196228773494,
  #     -0.0168423771687589430,
  #     -0.00017111407692153792,
  #     -0.9999947058517530000,
  #     0.0032494597148797887,
  #     -0.01684302179448474500,
  #     -0.0032461167514232880,
  #     -0.9998528768488223000,
  #   ]

odometry:
  surf_res: 0.3
  delay_time: 0.15
  max_iteration: 8
  log_print: false

  size_voxel_map: 0.4 # The voxel size of in the voxel map
  min_distance_points: 0.1
  max_num_points_in_voxel: 20 # The maximum number of points per voxel of the map
  max_distance: 15.0 # The threshold of the distance to suppress voxels from the map
  weight_alpha: 0.9
  weight_neighborhood: 0.1
  max_dist_to_plane_icp: 0.3
  init_num_frames: 20
  voxel_neighborhood: 1
  max_number_neighbors: 20
  threshold_voxel_occupancy: 1
  estimate_normal_from_neighborhood: true
  min_number_neighbors: 20 # The minimum number of neighbor points to define a valid neighborhood
  power_planarity: 2.0
  num_closest_neighbors: 1

  sampling_rate: 1.5
  max_num_residuals: 1000
  min_num_residuals: 50
  # ct_icp
  motion_compensation: CONSTANT_VELOCITY #NONE, CONSTANT_VELOCITY, ITERATIVE, CONTINUOUS
  beta_location_consistency: 1.0
  beta_orientation_consistency: 1.0
  beta_constant_velocity: 0.0
  beta_small_velocity: 0.0

  thres_translation_norm: 0.01 # m
  thres_orientation_norm: 0.1 # deg
